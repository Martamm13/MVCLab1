<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Usuń książkę</title>
</head>
<body>

<h1>Usuń książkę</h1>

<p>Czy na pewno chcesz usunąć:</p>
<p><strong>{{ book.title }}</strong> — {{ book.author }} ({{ book.publication_year }})</p>

<form method="post">
  {% csrf_token %}

  <a href="/library/">Anuluj</a>
</form>

</body>
</html>
